<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome Pack</title>
  <link rel="stylesheet" href="../Recursos/CSS/global.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="exit-overlay" id="exit-overlay"></div>
  <main class="pagina-carga">
    <img class="bg-image" src="../Recursos/Imagenes/Iamgen_PaginaCarga.svg" alt="" aria-hidden="true" />
    <section class="card" aria-labelledby="welcome-pack-title">
      <div class="card__inner">
        <header class="card__header">
          <h1 class="card__title" id="welcome-pack-title">
            <span class="card__title-mask card__title-mask--welcome"><span class="card__title-word">Welcome</span></span>
            <span class="card__title-mask card__title-mask--pack"><span class="card__title-word">Pack</span></span>
          </h1>
        </header>
        <div class="card__logo" aria-label="Logo UDIT" role="img">
          <img src="../Recursos/Imagenes/LogoUDIT_PaginaCarga.svg" alt="Logo UDIT" />
        </div>
      </div>
    </section>
  </main>
  <script>
    (function () {
      var REDIRECT_DELAY = 3800;
      var page = document.querySelector('.pagina-carga');
      var redirected = false;

      function goHome() {
        if (redirected) return;
        redirected = true;
        var overlay = document.getElementById('exit-overlay');
        overlay.style.opacity = '1';
        setTimeout(function () {
          window.location.href = '../Home/index.html';
        }, 520);
      }

      setTimeout(goHome, REDIRECT_DELAY);
      document.addEventListener('click', goHome);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') goHome();
      });
    })();
  </script>
</body>
</html>
